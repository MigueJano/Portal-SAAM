{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
  <h3>Crear Cotización</h3>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      {{ form_cliente.as_p }}
    </div>

    <div class="d-flex">
      <button type="submit" class="btn btn-outline-primary me-2">Siguiente</button>
      <a href="{% url 'home' %}" class="btn btn-outline-secondary me-2">Cerrar</a>
    </div>
  </form>
</div>
{% endblock %}
