{% extends 'base.html' %}
{% load custom_filters %}

{% block content %}
<h3>Vista previa para {{ cliente.nombre_cliente }}</h3>

<object data="{{ pdf_url }}" type="application/pdf" width="100%" height="600px">
    <p>Tu navegador no soporta PDFs embebidos. Puedes descargarlo <a href="{{ pdf_url }}">aquí</a>.</p>
</object>

<div class="mt-3">
  <a href="{{ pdf_url }}" class="btn btn-outline-primary" download>Descargar PDF</a>
  <a href="javascript:window.print()" class="btn btn-outline-secondary">Imprimir</a>
  <a href="{% url 'home' %}" class="btn btn-outline-secondary ">Cerrar</a>
</div>

{% endblock %}
